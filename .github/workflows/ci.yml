name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd dart_rpg
          flutter pub get

      - name: Analyze
        run: |
          cd dart_rpg
          flutter analyze --no-fatal-infos

      - name: Run tests
        run: |
          cd dart_rpg
          flutter test
